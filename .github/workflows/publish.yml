name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: NPM # reads the NPM_TOKEN secret from the "NPM" environment
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      # `npm publish` runs prepublishOnly (lint + typecheck + test + build)
      # and prepack (build) automatically, so the package is verified and
      # dist/ is freshly built before it is uploaded.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
